<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RTN Music Overlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay" class="transparent">
    <div class="card">
      <div class="left">
        <div class="cover-wrap">
          <img id="cover" src="assets/fallback-cover.svg" alt="cover" crossorigin="anonymous">
          <div id="cover-glow" class="cover-glow"></div>
        </div>
      </div>
      <div class="middle">
        <div class="meta">
          <div class="title-wrap">
            <div id="title" class="title">RTN MUSIC</div>
          </div>
          <div class="artist-wrap">
            <div id="artist" class="artist">RTN RADIO</div>
          </div>
          <div class="progress-row">
            <div id="elapsed" class="time">0:00</div>
            <div class="progress-bar" id="progress-bar">
              <div class="progress" id="progress"></div>
            </div>
            <div id="remaining" class="time">-0:00</div>
          </div>
        </div>
        <div class="equalizer-wrap">
          <!-- simple svg equalizer -->
          <svg id="equalizer" viewBox="0 0 120 40" preserveAspectRatio="none" class="equalizer">
            <rect class="bar b1" x="8" y="10" width="10" height="20" rx="2" />
            <rect class="bar b2" x="30" y="6" width="10" height="24" rx="2" />
            <rect class="bar b3" x="52" y="2" width="10" height="28" rx="2" />
            <rect class="bar b4" x="74" y="6" width="10" height="24" rx="2" />
            <rect class="bar b5" x="96" y="10" width="10" height="20" rx="2" />
          </svg>
        </div>
      </div>
      <div class="right">
        <img src="assets/rtn-logo.svg" alt="RTN" class="logo">
        <div id="live-badge" class="live-badge">EN DIRECTO</div>
      </div>
    </div>
  </div>
  <script>
    // Configurable API endpoint (se puede cambiar por query param ?api=...)
  </script>
  <script src="script.js"></script>
</body>
</html>
