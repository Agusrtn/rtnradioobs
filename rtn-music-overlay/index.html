<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RTN Music Overlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay" class="transparent">
    <div class="card">
      <div class="left">
        <div class="cover-wrap">
          <div class="cover-frame">
            <img id="cover" src="assets/fallback-cover.svg" alt="cover" crossorigin="anonymous">
          </div>
          <div id="cover-glow" class="cover-glow"></div>
        </div>
      </div>
      <div class="middle">
        <div class="meta">
          <div class="title-wrap">
            <div id="title" class="title">RTN MUSIC</div>
          </div>
          <div class="artist-wrap">
            <div id="artist" class="artist">RTN RADIO</div>
          </div>
          <div class="progress-row">
            <div id="elapsed" class="time">0:00</div>
            <div class="progress-bar" id="progress-bar">
              <div class="progress" id="progress"></div>
            </div>
            <div id="remaining" class="time">-0:00</div>
          </div>
        </div>
        <!-- equalizer removed for clean Spotify-like layout -->
      </div>
      <div class="right">
        <div class="card-logo">
          <img src="assets/LOGO.png" alt="RTN" class="logo">
        </div>
        <div id="live-badge" class="live-badge">EN DIRECTO</div>
      </div>
      </div>
    </div>
  </div>
  <audio id="player" crossorigin="anonymous" style="display:none"></audio>
  <script>
    // Configurable API endpoint (se puede cambiar por query param ?api=...)
  </script>
  <script src="script.js"></script>
</body>
</html>
